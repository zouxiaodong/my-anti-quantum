server:
  port: 8080

spring:
  application:
    name: quantum-poc-server
  profiles:
    active: dev

encryptor:
  host: 192.168.1.100
  port: 8101
  base-url: http://${encryptor.host}:${encryptor.port}
  timeout: 30000

logging:
  level:
    com.quantum.poc: DEBUG
    org.springframework.web.reactive.function.client: INFO
    reactor.netty: INFO
    io.netty: WARN
